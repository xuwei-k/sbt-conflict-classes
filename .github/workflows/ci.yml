name: CI
on:
  pull_request:
  push:
    branches:
      - master
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: temurin
    - uses: sbt/setup-sbt@66fb4376e81982c7d92a4074170846fff88e2e30 # v1.5.0
    - uses: coursier/cache-action@v8
    - run: sbt
           -v
           --server
           "+ scalafmtCheckAll"
           scalafmtSbtCheck
           "+ test"
           "+ scripted"
