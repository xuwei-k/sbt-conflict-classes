name: CI
on:
  pull_request:
  push:
    branches:
      - master
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: temurin
    - uses: sbt/setup-sbt@2e222825582620cc38d2a54e674f3c01b7c14f5d # v1.1.24
    - uses: coursier/cache-action@v8
    - run: sbt
           -v
           --server
           "+ scalafmtCheckAll"
           scalafmtSbtCheck
           "+ test"
           "+ scripted"
