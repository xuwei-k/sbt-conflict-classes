name: CI
on:
  pull_request:
  push:
    branches:
      - master
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v7
    - uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: temurin
    - uses: sbt/setup-sbt@6444f4c8111de4b9059c3975def104b03cfaa5f0 # v1.5.2
    - uses: coursier/cache-action@v8
    - run: sbt
           -v
           --server
           "+ scalafmtCheckAll"
           scalafmtSbtCheck
           "+ test"
           "+ scripted"
