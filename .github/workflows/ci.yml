name: CI
on:
  pull_request:
  push:
    branches:
      - master
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: temurin
    - uses: sbt/setup-sbt@af116cce31c00823d3903ce687f9cda3a4f19f1b # v1.2.1
    - uses: coursier/cache-action@v8
    - run: sbt
           -v
           --server
           "+ scalafmtCheckAll"
           scalafmtSbtCheck
           "+ test"
           "+ scripted"
